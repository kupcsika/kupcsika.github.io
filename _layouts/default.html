<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    {% seo %}
    <!-- Modern Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ '/assets/css/main.css?v=' | append: site.github.build_revision | relative_url }}">
    <script>
      const storedTheme = localStorage.getItem('theme');
      const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (storedTheme === 'dark' || (!storedTheme && systemPrefersDark)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    </script>
  </head>
  <body>
    <button id="theme-toggle" class="global-theme-toggle" aria-label="Toggle theme" title="Toggle Light/Dark Theme">
      <span class="icon sun-icon" style="display: none;">☀️</span>
      <span class="icon moon-icon" style="display: none;">🌙</span>
    </button>
    <div class="app-wrapper">
      <aside class="sidebar">
        <header>
          <div class="profile-container">
            {% if site.logo %}
              <img src="{{site.logo | relative_url}}" alt="Andras Kupcsik" class="profile-img" />
            {% endif %}
            <h1 class="profile-name">Andras Kupcsik</h1>
            <p class="profile-description">{{ site.description | default: site.github.project_tagline }}</p>
          </div>

          <div class="social-links">
            <a href="https://www.linkedin.com/in/andras-kupcsik-b69a6843/" target="_blank" rel="noopener noreferrer" class="link-btn">
              <span class="icon">👔</span> LinkedIn
            </a>
            <a href="https://scholar.google.com/citations?user=G0EQYYIAAAAJ&hl=en" target="_blank" rel="noopener noreferrer" class="link-btn">
              <span class="icon">🎓</span> Google Scholar
            </a>
            <a href="https://www.astrobin.com/users/kupcsika/" target="_blank" rel="noopener noreferrer" class="link-btn">
              <span class="icon">⭐</span> AstroBin
            </a>
          </div>
        </header>
      </aside>

      <main class="content-area">
        <section class="content-wrapper">
          {{ content }}
        </section>
        
        <footer>
          <p>&copy; {{ 'now' | date: "%Y" }} Andras Kupcsik. Hosted on <a href="https://pages.github.com/">GitHub Pages</a>.</p>
        </footer>
      </main>
    </div>
    <script>
      const toggleBtn = document.getElementById('theme-toggle');
      const html = document.documentElement;
      
      const updateIcon = () => {
        const isDark = html.getAttribute('data-theme') === 'dark';
        document.querySelector('.sun-icon').style.display = isDark ? 'inline' : 'none';
        document.querySelector('.moon-icon').style.display = isDark ? 'none' : 'inline';
      };
      
      updateIcon();
      
      toggleBtn.addEventListener('click', () => {
        let currentTheme = html.getAttribute('data-theme');
        let targetTheme = currentTheme === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', targetTheme);
        localStorage.setItem('theme', targetTheme);
        updateIcon();
      });
    </script>
  </body>
</html>
